name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: shellcheck bin/ctu-thesis lib/core.sh lib/version.sh lib/commands/*.sh install.sh

  template-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check compliance.json ↔ info.typ sync
        run: |
          bash tests/test_template_sync.sh

  template-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: typst-community/setup-typst@v3
        with:
          typst-version: '0.12.0'
      - name: Compile template standalone
        run: typst compile templates/main.typ /tmp/template-test.pdf

  test:
    runs-on: ubuntu-latest
    needs: [lint, template-sync]
    steps:
      - uses: actions/checkout@v4
      - uses: typst-community/setup-typst@v3
        with:
          typst-version: '0.12.0'
      - name: Install bats
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git
          cd bats-core
          sudo ./install.sh /usr/local
      - name: Install fonts
        run: |
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer
      - name: Run tests
        run: bats --tap tests/
